name: Deploy resume site
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::481665121849:role/resume-github-role
          aws-region: us-east-1
      - name: Upload assets
        run: |
          aws s3 sync ./dist s3://harish8.com \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
      - name: Upload HTML
        run: |
          aws s3 sync ./dist s3://harish8.com \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "*.html"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2IVSU113ZKC4N \
            --paths "/*"
